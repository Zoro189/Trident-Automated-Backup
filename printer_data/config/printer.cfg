# Voron Trident 300mm - BigTreeTech Octopus V1.1 - TMC2209 UART
# Firmware: STM32F446, 32KiB bootloader, 12MHz crystal, USB PA11/PA12
# Flash: dfu-util -a 0 -s 0x08000000:force:mass-erase:leave -D ~/klipper/out/klipper.bin -d 0483:df11

#####################################################################
#   Includes
#####################################################################

[exclude_object]
[include mmu/base/*.cfg]
[include mmu/addons/mmu_eject_buttons.cfg]
[include mmu/optional/client_macros.cfg]
[include emu_macros.cfg]
[include print_start.cfg]
[include bigtreetech-ebb-canbus-v1.2.cfg]
[include stealthburner_leds.cfg]
[include KAMP_Settings.cfg]
[include mainsail.cfg]
[include TEST_SPEED.cfg]
[include homing.cfg]
[include goose_purge.cfg]
[include Macros/*]

#####################################################################
#   MCU
#####################################################################

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_0D0036001250535556323420-if00
restart_method: command

[mcu cartographer]
canbus_uuid: ca47716a500b

[force_move]
enable_force_move: True

#####################################################################
#   Printer
#####################################################################

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 8000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5.0
minimum_cruise_ratio: 0.5

[idle_timeout]
timeout: 3600                                                                  ; 1 hour - prevents timeout during long bed soaks/chamber heating

#####################################################################
#   Cartographer Probe
#####################################################################

[cartographer]
mcu: cartographer
x_offset: 0                                                                    ; offset from nozzle tip to centre of coil
y_offset: 18                                                                   ; offset from nozzle tip to centre of coil
verbose: no

[bed_mesh]
zero_reference_position: 150, 150
speed: 300
horizontal_move_z: 3
mesh_min: 35, 24                                                               ; mesh_min y = physical_min + y_offset (6 + 18)
mesh_max: 240, 216                                                             ; mesh_max y = physical_max + y_offset (198 + 18)
probe_count: 20, 20
adaptive_margin: 10
mesh_pps: 0, 0                                                                 ; disable interpolation - mesh is dense enough
algorithm: bicubic

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left - MOTOR_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_endstop: 305                                                          ; 300mm build
position_max: 305
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: False
stealthchop_threshold: 0
run_current: 0.99
sense_resistor: 0.110
driver_TBL: 1
driver_TOFF: 3
driver_HSTRT: 3
driver_HEND: 3
diag_pin: ^PG6
driver_SGTHRS: 94

##  A Stepper - Right - MOTOR_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 16
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_min: 0
position_endstop: 313                                                          ; 300mm build
position_max: 313
homing_speed: 40
homing_retract_dist: 0
homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: False
run_current: 0.99
sense_resistor: 0.110
stealthchop_threshold: 0
driver_TBL: 1
driver_TOFF: 3
driver_HSTRT: 3
driver_HEND: 3
diag_pin: ^PG9
driver_SGTHRS: 111

#####################################################################
#   Z Stepper Settings
#####################################################################

##  Z0 - Front Left - MOTOR_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 4
microsteps: 32
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -5
homing_speed: 8.0
second_homing_speed: 3
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 - Rear Center - MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
rotation_distance: 4
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 - Front Right - MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 4
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: False
run_current: 0.6
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: EBBCan:PD0
dir_pin: EBBCan:PD1
enable_pin: !EBBCan:PD2
rotation_distance: 4.701
microsteps: 16
full_steps_per_rotation: 200
max_extrude_cross_section: 5
max_extrude_only_distance: 101
max_extrude_only_velocity: 120
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan:PB13
sensor_type: MAX31865
sensor_pin: EBBCan:PA4
spi_bus: spi1
rtd_nominal_r: 100
rtd_reference_r: 430
rtd_num_of_wires: 2
min_temp: 0
max_temp: 340

[tmc2209 extruder]
uart_pin: EBBCan:PA15
run_current: 0.650
stealthchop_threshold: 999999

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 1
min_temp: 0
max_temp: 120

#####################################################################
#   Chamber Heater (fans under bed)
#####################################################################

[multi_pin the_filter]
pins: PD15, PD14

[heater_generic heater_chamber]
heater_pin: multi_pin:the_filter
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF5
control: pid
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
pwm_cycle_time: 0.3
min_temp: 10
max_temp: 90

[verify_heater heater_chamber]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1

[gcode_macro SET_CHAMBER]
gcode:
    {% set chamber_target = params.CHAMBER_TEMP|default(0)|float %}
    SET_HEATER_TEMPERATURE heater=heater_chamber target={chamber_target}

#####################################################################
#   Fan Control
#####################################################################

[controller_fan my_controller_fan]
pin: PD12
kick_start_time: 0.5
off_below: 0.10
fan_speed: 0.6
heater: heater_bed, extruder                                                   ; run fan when either bed or extruder is active

#####################################################################
#   LED Control
#####################################################################

[output_pin caselight]
pin: PD13
pwm: true
hardware_pwm: true
shutdown_value: 0
value: 1
cycle_time: 0.01

#####################################################################
#   Homing and Gantry
#####################################################################

[safe_z_home]
home_xy_position: 150, 150
z_hop: 10

[z_tilt]
##  300mm build
z_positions:
   -50, 18
   150, 348
   350, 18
points:
   30, 5
   150, 245
   270, 5
speed: 200
horizontal_move_z: 15
retries: 5
retry_tolerance: 0.0075

#####################################################################
#   Input Shaper
#####################################################################

[input_shaper]
shaper_freq_x: 57.6
shaper_type_x: mzv
shaper_freq_y: 39.4
shaper_type_y: mzv
damping_ratio_x: 0.068
damping_ratio_y: 0.061

[adxl345]
cs_pin: cartographer:PA3                                                       ; Cartographer V3 - change to cartographer:PA0 for V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20

#####################################################################
#   Shake&Tune
#####################################################################

[shaketune]
measurements_chunk_size: 2
max_freq: 200
dpi: 300

#####################################################################
#   Temperature Sensors
#####################################################################

[temperature_sensor BTT_Pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor MCU]
sensor_type: temperature_mcu
max_temp: 100

#####################################################################
#   Spoolman
#####################################################################

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
    {% if params.ID %}
        {% set id = params.ID|int %}
        {action_call_remote_method(
           "spoolman_set_active_spool",
           spool_id=id
        )}
    {% else %}
        {action_respond_info("Parameter 'ID' is required")}
    {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
    {action_call_remote_method(
        "spoolman_set_active_spool",
        spool_id=None
    )}

#####################################################################
#   Board Pins
#####################################################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8,  EXP1_2=PE7,
    EXP1_3=PE9,  EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

