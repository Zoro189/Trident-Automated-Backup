[gcode_macro WIPE]
gcode:
    {% set travel_speed = 18000 %}  # 300 mm/s
    {% set wipe_speed = 12000 %}    # 200 mm/s

    G90

    G1 X67 Y310 F{travel_speed}

    G1 X94 F{wipe_speed}

    G1 Y308 F{travel_speed}
    G1 X67 F{wipe_speed}

    G1 Y306 F{travel_speed}
    G1 X94 F{wipe_speed}

    G1 Y305 F{travel_speed}
    G1 X67 F{wipe_speed}

    G1 Y307 F{travel_speed}
    G1 X94 F{wipe_speed}

    G1 Y309 F{travel_speed}
    G1 X67 F{wipe_speed}

    G1 X105 Y300 F{travel_speed}